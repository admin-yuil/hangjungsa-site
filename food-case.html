<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>식품·축산 인허가 사례 | 유일행정사사무소</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Sans KR', sans-serif;
    background:#f8fafc;
    color:#1e293b;
}

.header{
    background:#0f172a;
    color:#fff;
    text-align:center;
    padding:60px 20px;
}

.header h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

.header p{
    opacity:0.85;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:60px 20px;
}

.back-btn{
    display:inline-block;
    margin-bottom:30px;
    padding:12px 20px;
    background:#0f172a;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    transition:0.3s;
}

.back-btn:hover{
    background:#1e293b;
}

.case-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
}

.case-card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.3s;
}

.case-card:hover{
    transform:translateY(-6px);
}

.case-card img{
    width:100%;
    height:400px;
    object-fit:contain;
    background:#f8fafc;
    padding:10px;
}

.case-content{
    padding:25px;
}

.case-content h3{
    margin-bottom:10px;
    color:#0f172a;
}

.case-content p{
    color:#64748b;
    line-height:1.6;
}

.footer{
    text-align:center;
    padding:40px 20px;
    color:#64748b;
}
</style>

</head>
<body>

<div class="header">
    <h1>식품·축산 인허가 사례</h1>
    <p>유일행정사사무소 주요 성공사례</p>
</div>

<div class="container">

    <a href="index.html" class="back-btn">← 홈페이지로 돌아가기</a>

    <div class="case-grid">

        <div class="case-card">
            <img src="assets/cases/식품·축산 인허가1.jpg" alt="식품·축산 인허가 사례">
            <div class="case-content">
                <h3>식품·축산 인허가 사례</h3>

            </div>
        </div>

        <div class="case-card">
            <img src="assets/cases/20260608_153203.jpg" alt="식품영업 등록 사례">
            <div class="case-content">
                <h3>식품영업 등록 사례</h3>
                <p>식품제조·가공업 및 관련 인허가 수행 사례</p>
            </div>
        </div>

        <div class="case-card">
            <img src="assets/cases/20260608_155158.jpg" alt="축산물 인허가 사례">
            <div class="case-content">
                <h3>축산물 인허가 사례</h3>

        </div>

        <div class="case-card">
            <img src="assets/cases/20260608_155717.jpg" alt="비영리법인 설립 사례">

        </div>

        <div class="case-card">
            <img src="assets/cases/20260608_161034.jpg" alt="출입국 민원 사례">

                <h3>출입국 민원 사례</h3>

    </div>

</div>

<div class="footer">
    <p>유일행정사사무소 | 식품·축산물 인허가 및 HACCP 전문</p>
